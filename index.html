<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Notes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
</head>

<body>
    <div class="one">
        <h1>Quick Notes</h1>
    </div>
    <div class="potter">
        <div class="harry">
            <h2>01-01-2026</h2>
            <h4>Reminder</h4>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Earum ea eum atque nostrum ratione corporis totam vel perspiciatis corrupti at minima, tempora nisi dignissimos voluptatum optio veniam quibusdam. Et, exercitationem.</p>
            <button onclick="def(event)">delete</button>

        </div>
    </div>
    <button class="plus">+</button>
    <div class="pop"></div>
        <div class="popup-over">
            <h2>ADD NOTES</h2>
            <form>
            <input type="text" placeholder="Date" id="title">
            <input type="text" placeholder="Title" id="author">
            <textarea placeholder="Description" id="description"></textarea>
            <button id="addition">ADD</button>
            <button>CANCEL</button>
            </form>
        </div>




    <script src="sample.js"></script>
</body>

</html>
